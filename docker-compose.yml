version: '3.8'

services:
  # Backend API Server
  backend:
    build: ./backend
    container_name: near-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEAR_NETWORK=testnet
      - NEAR_NODE_URL=https://rpc.testnet.near.org
      - NEAR_CONTRACT_ID=${NEAR_CONTRACT_ID}
      - NEAR_MASTER_ACCOUNT=${NEAR_MASTER_ACCOUNT}
      - NEAR_MASTER_PRIVATE_KEY=${NEAR_MASTER_PRIVATE_KEY}
    restart: unless-stopped
    networks:
      - near-network

  # Frontend Web Server
  frontend:
    build: ./frontend
    container_name: near-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - near-network

networks:
  near-network:
    driver: bridge
