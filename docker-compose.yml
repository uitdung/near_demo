services:
  # Backend API Server
  backend:
    build: ./backend
    container_name: near-backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 3000
    restart: unless-stopped
    networks:
      - near-network

  # Frontend Web Server
  frontend:
    build: ./frontend
    container_name: near-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - near-network

networks:
  near-network:
    driver: bridge
